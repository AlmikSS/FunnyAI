<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCG AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        bgDark: '#131314', // Gemini dark background
                        panelDark: '#1e1f20', // Gemini panel background
                        borderDark: '#333537', 
                        accent: '#a8c7fa', // Gemini blue tint
                        userBubble: '#282a2c'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bgDark text-gray-200 h-screen flex overflow-hidden font-sans antialiased">

    <div class="md:hidden absolute top-0 left-0 w-full h-14 bg-bgDark border-b border-borderDark flex items-center justify-between px-4 z-20">
        <button id="mobileMenuBtn" class="text-gray-400 hover:text-white transition-colors">
            <i data-lucide="menu"></i>
        </button>
        <div class="flex items-center gap-2">
            <i data-lucide="sparkles" class="w-4 h-4 text-accent"></i>
            <span class="font-medium tracking-wide text-white">CCG AI</span>
        </div>
        <div class="w-6"></div>
    </div>

    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden transition-opacity"></div>

    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 w-72 bg-panelDark flex flex-col z-30">
        <div class="p-4">
            <button id="newChatBtn" class="flex items-center gap-3 w-full bg-bgDark hover:bg-borderDark border border-borderDark rounded-full p-3 transition-colors duration-200 shadow-sm">
                <i data-lucide="plus" class="w-5 h-5 text-gray-300"></i>
                <span class="text-sm font-medium text-gray-200">Новый чат</span>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar px-3 pb-4 mt-2">
            <div class="text-xs font-medium text-gray-500 mb-2 px-3">Недавние</div>
            <div id="chatList" class="flex flex-col gap-1">
                </div>
        </div>

        <div class="p-4 mt-auto">
            <button id="openSettingsBtn" class="flex items-center gap-3 w-full hover:bg-borderDark rounded-xl p-3 transition-colors text-sm font-medium text-gray-300">
                <i data-lucide="settings" class="w-5 h-5"></i>
                Настройки сценария
            </button>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative pt-14 md:pt-0 bg-bgDark">
        
        <div id="chatContainer" class="flex-1 overflow-y-auto p-4 md:p-8 space-y-8 custom-scrollbar pb-40">
            </div>

        <div class="absolute bottom-0 left-0 w-full bg-bgDark pt-6 pb-6 px-4 md:px-8">
            <div class="max-w-4xl mx-auto relative">
                <div class="relative flex items-end bg-panelDark rounded-3xl transition-colors">
                    <textarea id="messageInput" rows="1" class="w-full bg-transparent text-gray-100 placeholder-gray-400 p-4 pl-6 max-h-48 outline-none resize-none custom-scrollbar" placeholder="Введите запрос к CCG AI..."></textarea>
                    <button id="sendBtn" class="p-3 mb-1 mr-2 text-gray-400 hover:text-white transition-all disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center">
                        <i data-lucide="send-horizonal" class="w-6 h-6"></i>
                    </button>
                </div>
                <div class="text-center text-[11px] text-gray-500 mt-2">
                    Ответы генерируются по заранее заданному сценарию.
                </div>
            </div>
        </div>
    </main>

    <div id="settingsModal" class="fixed inset-0 bg-black/80 z-50 hidden flex items-center justify-center backdrop-blur-sm transition-opacity">
        <div class="bg-panelDark w-full max-w-4xl rounded-2xl shadow-2xl border border-borderDark flex flex-col h-[85vh] md:h-[75vh]" id="settingsContent">
            
            <div class="flex items-center justify-between p-5 border-b border-borderDark">
                <h2 class="font-semibold text-lg text-white flex items-center gap-2">
                    <i data-lucide="sliders-horizontal" class="w-5 h-5"></i>
                    Панель управления CCG AI
                </h2>
                <button class="close-settings text-gray-400 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            
            <div class="flex-1 flex flex-col md:flex-row overflow-hidden">
                <div class="w-full md:w-56 border-r border-borderDark flex flex-col p-3 gap-1 bg-bgDark">
                    <button class="tab-btn active w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium transition-colors" data-target="tab-prompts">База ответов</button>
                    <button class="tab-btn w-full text-left px-4 py-2.5 rounded-lg text-sm font-medium transition-colors text-gray-400 hover:bg-borderDark" data-target="tab-general">Система</button>
                </div>
                
                <div class="flex-1 overflow-y-auto custom-scrollbar p-6 bg-panelDark flex flex-col">
                    
                    <div id="tab-prompts" class="tab-content h-full flex flex-col">
                        <div class="flex justify-between items-end mb-6">
                            <div>
                                <h3 class="text-lg font-medium text-white mb-1">Сценарий диалога</h3>
                                <p class="text-xs text-gray-400">Настройте реплики и время имитации обработки (в секундах).</p>
                            </div>
                            <button id="clearAllReplicasBtn" class="text-red-400 hover:text-red-300 text-sm font-medium px-2 py-1 rounded hover:bg-red-400/10 transition">
                                Удалить всё
                            </button>
                        </div>
                        
                        <div id="replicasList" class="flex flex-col gap-4 flex-1 overflow-y-auto custom-scrollbar pr-2 pb-4">
                            </div>
                        
                        <button id="addReplicaBtn" class="mt-4 flex items-center justify-center gap-2 w-full border border-dashed border-borderDark text-gray-400 hover:text-white hover:border-borderDark hover:bg-borderDark/50 rounded-xl p-3 transition-colors text-sm font-medium">
                            <i data-lucide="plus" class="w-4 h-4"></i>
                            Добавить правило
                        </button>
                    </div>

                    <div id="tab-general" class="tab-content hidden h-full">
                        <h3 class="text-lg font-medium text-white mb-6">Системные настройки</h3>
                        <div class="space-y-4">
                            <div class="flex items-center justify-between p-4 bg-bgDark border border-borderDark rounded-xl">
                                <div>
                                    <div class="text-sm font-medium text-white">Очистка данных</div>
                                    <div class="text-xs text-gray-500 mt-1">Удалить всю историю чатов с устройства</div>
                                </div>
                                <button id="deleteAllChatsBtn" class="px-4 py-2 bg-red-500/10 text-red-500 rounded-lg text-sm font-medium hover:bg-red-500/20 transition-colors">Сбросить историю</button>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <div class="p-4 border-t border-borderDark bg-bgDark flex justify-end gap-3 rounded-b-2xl">
                <button class="close-settings px-5 py-2 rounded-xl text-sm font-medium text-gray-300 hover:text-white hover:bg-borderDark transition-colors">Отмена</button>
                <button id="saveSettingsBtn" class="px-6 py-2 rounded-xl text-sm font-medium bg-gray-100 text-black hover:bg-white transition-colors">Сохранить</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
